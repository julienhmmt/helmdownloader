# platform: "linux/amd64"
# output_dir: "archives"
# work_dir: "./workdir"
# concurrency: 4
# retries: 2
# compression: "zstd"
# min_free_disk_mb: 1024
# resume: true
# https_proxy: "http://proxy.domain.local:3128"
# registry_auth: true
