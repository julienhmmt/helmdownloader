# =============================================================================
# helmdownloader configuration example
# =============================================================================
#
# Copy this file to the default auto-load path (preferred):
#   ~/.config/helmdownloader/config.yaml
# Or, if that file does not exist, macOS also checks:
#   ~/Library/Application Support/helmdownloader/config.yaml
# Or pass an explicit path:
#   ./config.yaml   →   helmdownloader -config ./config.yaml
#
# Usage:
#   mkdir -p ~/.config/helmdownloader
#   cp config.example.yaml ~/.config/helmdownloader/config.yaml
#   # edit as needed, then:
#   helmdownloader
#   helmdownloader -config /path/to/config.yaml
##
# Precedence (highest wins):
#   1. CLI flags (when set / non-sentinel)
#   2. Values in this file
#   3. Built-in defaults (see each field below)
#   4. Environment fallback (proxy only: HTTP_PROXY, then HTTPS_PROXY)
#
# Unset YAML fields keep their defaults (Load unmarshals onto Default()).
# A missing config file is not an error: defaults are used as-is.
#
# Source of truth: pkg/config/config.go (Config + Default).
# CLI merge rules: main.go. User docs: README.md.
# =============================================================================

# -----------------------------------------------------------------------------
# Registry & retagging
# -----------------------------------------------------------------------------

# Prefix prepended to every image reference when retagging for the airgapped
# registry. Destination refs become:
#   <registry_prefix>/<original-path>:<tag>
# Example: "rgy01.domain.local" → rgy01.domain.local/quay.io/argoproj/argocd:v3.2.6
# CLI: -registry-prefix
# Default: "" (no retag prefix)
registry_prefix: ""

# When true, pull from private registries using the default Docker keychain
# (~/.docker/config.json, $DOCKER_CONFIG/config.json, or Podman
# containers/auth.json). Log in first with `docker login` or `podman login`.
# CLI: -registry-auth
# Default: false
registry_auth: false

# -----------------------------------------------------------------------------
# Platform & layout
# -----------------------------------------------------------------------------

# OS/arch platform for multi-arch image pulls (go-containerregistry platform
# filter). Common values: linux/amd64, linux/arm64.
# CLI: -platform
# Default: "linux/amd64"
platform: "linux/amd64"

# Directory where finished chart bundles are written
# (<chart>-<version>-bundle.tar.gz or .tar.zst).
# CLI: -output
# Default: "archives"
output_dir: "archives"

# Directory for intermediate files (pulled charts, image tarballs, helm
# hermetic repo cache). Empty string → a fresh temp dir each run (auto-cleaned
# by the OS later). Use a fixed path when you want -resume / resume: true.
# CLI: -work-dir
# Default: "" (temporary)
work_dir: ""

# -----------------------------------------------------------------------------
# Download behavior
# -----------------------------------------------------------------------------

# Max parallel image downloads. Values below 1 are treated as 1.
# CLI: -concurrency
# Default: 4
concurrency: 4

# Additional retry attempts after the first failed pull, with exponential
# backoff. Negative values are treated as 0.
# CLI: -retries
# Default: 2
retries: 2

# Bundle archive codec:
#   gzip  → .tar.gz (widest compatibility)
#   zstd  → .tar.zst (typically smaller)
# Invalid values fail at startup (fail-fast validation).
# CLI: -compression
# Default: "gzip"
compression: "gzip"

# Minimum free disk space (MiB) on the work directory's filesystem before
# download starts. Set to 0 to disable the check.
# CLI: -min-free-mb
# Default: 500
min_free_disk_mb: 500

# When true, reuse image tarballs already present under work_dir instead of
# re-pulling. Only useful with a fixed work_dir (not a temp path).
# Reuse requires matching content-hash (.sha256) and registry digest (.digest)
# sidecars from a prior successful pull; older work dirs without content hashes
# re-pull safely.
# CLI: -resume (flag enables only; cannot turn resume off from config via flag)
# Default: false
resume: false

# -----------------------------------------------------------------------------
# Network
# -----------------------------------------------------------------------------

# Proxy URL for ArtifactHub search, helm chart pulls, and registry image pulls.
# Example: "http://proxy.domain.local:3128"
# If left empty here and unset on the CLI, falls back to HTTP_PROXY, then
# HTTPS_PROXY from the environment.
# CLI: -proxy
# Default: ""
https_proxy: ""

# Base URL of the ArtifactHub API (config only; no CLI flag).
# Override for mirrors or self-hosted proxies that speak the same API.
# Default: "https://artifacthub.io"
artifacthub_url: "https://artifacthub.io"

# Cap on the number of chart search results requested from ArtifactHub
# (config only; no CLI flag).
# Default: 20
search_limit: 20

# -----------------------------------------------------------------------------
# Helm
# -----------------------------------------------------------------------------

# Helm executable name or absolute path (config only; no CLI flag).
# Chart pulls are hermetic: HELM_REPOSITORY_CONFIG and HELM_REPOSITORY_CACHE
# are scoped under the work directory — your global ~/.config/helm is unused.
# Default: "helm"
helm_bin: "helm"

# Extra values files layered onto the chart when rendering for image discovery,
# so images gated on non-default values are found. Paths are relative to the
# process working directory unless absolute.
# CLI: -values (repeatable; if any flag is set, it replaces this list)
# Default: []
values_files: []
# Example:
# values_files:
#   - ./my-values.yaml
#   - ./env/prod-images.yaml

# key=value overrides applied when rendering for image discovery (helm --set).
# Complements values_files.
# CLI: -set (repeatable; if any flag is set, it replaces this list)
# Default: []
set_values: []
# Example:
# set_values:
#   - monitoring.enabled=true
#   - image.tag=v1.2.3

# -----------------------------------------------------------------------------
# Security review workflow (export / import image lists)
# -----------------------------------------------------------------------------

# After Prepare (chart render + image discovery), write the discovered image
# list as JSON to this path so a security team can review before pulling.
# Typical flow: run once with export_images, quit from Review (Esc), edit the
# JSON, then run again with import_images.
# CLI: -export-images
# Default: "" (disabled)
export_images: ""
# Example: export_images: "images.json"

# At download time, read an approved image list (JSON) from this path and
# override the discovered/selected set. Invalid refs fail closed before pull.
# JSON shape: [{"ref": "quay.io/argoproj/argocd:v3.2.6", "selected": true}, ...]
# CLI: -import-images
# Default: "" (disabled)
import_images: ""
# Example: import_images: "images-approved.json"

# -----------------------------------------------------------------------------
# TUI appearance
# -----------------------------------------------------------------------------

# TUI color theme:
#   auto            follow the terminal (default; no forced background)
#   light           light palette + matching terminal background
#   dark            dark palette + matching terminal background
#   high-contrast   high-contrast palette
#   ocean           cool blue palette
#   matrix          green-on-black palette
# Named themes (everything except auto) set a matching terminal background so
# adaptive text stays readable. Press Ctrl+T in the TUI to open the theme menu.
# CLI: -theme
# Default: "auto"
theme: "auto"

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------

# When true, write leveled logs to log_file. Also implied when log_level is set
# via CLI (-log-level). Without verbose, logging is discarded (silent UI-only).
# CLI: -v implies verbose=true and log_level=debug
# Default: false
verbose: false

# Log verbosity when logging is enabled: silent | info | debug
# CLI: -log-level (setting the flag also forces verbose=true)
# Default: "info"
log_level: "info"

# Path for log output when verbose logging is on. Opened append-only with mode
# 0600 (image refs / proxy hosts / chart names are not world-readable).
#
# Merge note: if log_file is non-empty in this file, it wins over the CLI
# -log-file flag. The CLI default is used only when this field is empty.
# CLI: -log-file (default when config log_file is empty: "helmdownloader.log")
# Default: "" (then CLI/default "helmdownloader.log")
log_file: ""
# Example: log_file: "helmdownloader.log"

# =============================================================================
